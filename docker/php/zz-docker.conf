[www]
; Force error logging for PHP workers in this pool
php_admin_flag[log_errors] = on

; Disable catch_workers_output so PHP's own error_log directive takes effect instead of FPM master intercepting it
catch_workers_output = no

; Route PHP errors to the tmpfs file monitored by the tail forwarder
php_admin_value[error_log] = /var/www/html/tmp/php_errors.log
