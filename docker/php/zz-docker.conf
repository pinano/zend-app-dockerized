[www]
; Force error logging for PHP workers in this pool
php_admin_flag[log_errors] = on

; Enable catch_workers_output so PHP errors also appear in Docker logs (docker compose logs app).
; Without this, errors ONLY go to the file below and are invisible to Grafana/Loki.
; decorate_workers_output=no prevents the ugly "[pool www] child XXXX" prefix on each line.
catch_workers_output = yes
decorate_workers_output = no

; Route PHP errors to the physical file for separate tailing (make logs-php)
php_admin_value[error_log] = /var/www/html/tmp/php_errors.log

; Slow request log — logs the backtrace of any request exceeding the threshold.
; Invaluable for identifying slow queries and bottlenecks in legacy code.
; Set PHP_FPM_SLOWLOG_TIMEOUT=0 in .env to disable.
slowlog = /var/www/html/tmp/php-fpm-slow.log
request_slowlog_timeout = ${PHP_FPM_SLOWLOG_TIMEOUT}
