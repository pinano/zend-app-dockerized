; -----------------------------------------
; Custom PHP Configuration Overrides
; -----------------------------------------
; Use this file specifically for configuration tweaks not exposed as env vars
; by the serversideup/php base image, or settings that are constant across
; environments (dev/prod) for this stack.
; This file is mapped as read-only into both the `app` and `cron` services.
;
; Note: Modifications here require an app container restart:
; make restart (or docker compose restart app)
;
; --- Performance: Realpath Cache ---
; ZF1's autoloader resolves many filesystem paths per request.
; Increasing the cache size reduces redundant realpath() syscalls.
; 16M covers large ZF1 codebases with many class files and view scripts.
; TTL is controlled separately by PHP_REALPATH_CACHE_TTL in docker-compose.yml.
realpath_cache_size = 16M

; --- Performance: OPcache Interned Strings Buffer ---
; ZF1 generates many repeated strings (class names, method names, SQL fragments).
; The default 8MB fills quickly on large codebases. 16MB reduces allocations
; and pointer lookups inside the OPcache shared memory segment.
; Requires a PHP-FPM restart to take effect (make restart).
opcache.interned_strings_buffer = ${PHP_OPCACHE_INTERNED_STRINGS_BUFFER}

; --- Performance: OPcache Huge Code Pages ---
; Reduces TLB misses for large ZF1 codebases (1-5% improvement).
; Requires transparent huge pages enabled on the host.
opcache.huge_code_pages = ${PHP_OPCACHE_HUGE_CODE_PAGES}

; --- Xdebug Configuration ---
; Controls Xdebug mode dynamically via PHP_XDEBUG_MODE env var.
; Supported modes: off, debug, develop, coverage, profile, trace.
; Setting to off ensures zero runtime performance overhead in production.
xdebug.mode = ${PHP_XDEBUG_MODE}
xdebug.client_host = host.docker.internal
xdebug.start_with_request = yes
