# ===================================================================================
# Docker App Backup Configuration Template
# ===================================================================================
# Copy this file to /home/sistemas/scripts/docker-backup.conf in production and customize.

# Name of the Proxmox host hypervisor (used for organizing backups by server)
PROXMOX_HOST=pve-node-01

# Root directory of the backup destination (e.g. where Dropbox is mounted/synced)
BACKUP_ROOT_DIR=/Dropbox

# Base directory containing the Dockerized project folders on the host
PROJECTS_ROOT_DIR=/home/sistemas/docker

# Directory to store the tar incremental state metadata (.snar files)
METADATA_DIR=/home/sistemas/scripts/docker-backup-metadata

# Backup retention in days. Backups older than this number of days will be deleted.
RETENTION_DAYS=7

# Comma-separated list of paths (relative to the project root) to exclude from backups
# (e.g. cache directories, logs, temporary files).
# Do not use leading or trailing slashes, and do not use spaces.
# Default exclusions (.git, mariadb_data) are always active and do not need to be listed here.
# Example: EXCLUDE_PATHS="docroot/public/cache,docroot/public/temp"
EXCLUDE_PATHS=""

# ===================================================================================
# Failsafes and Advanced Options
# ===================================================================================

# Canary file inside BACKUP_ROOT_DIR to verify the mount is active on the host.
# The script will verify that this file exists before writing any backups.
# You can create a blank file named .dropbox_mounted at the root of your Dropbox folder.
# Leave blank to disable this check.
CANARY_FILE="/Dropbox/.dropbox_mounted"

# Path to the single-execution lock file to prevent overlapping runs.
LOCK_FILE="/tmp/docker-backup.lock"

# Base directory for temporary SQL dumps before compression.
# If your DB is larger than the LXC's /tmp size (often a small RAM tmpfs), change this
# to a location on the main storage disk (e.g., "/home/sistemas/scripts/tmp").
TEMP_DIR="/tmp"

# Operation Timeouts (using the linux 'timeout' utility duration format, e.g. 1h, 30m, 7200s).
# Prevents backup hangs from blocking the script indefinitely.
DB_TIMEOUT="1h"
TAR_TIMEOUT="2h"

# Telegram Notifications (Optional)
# To receive status alerts on Telegram, create a bot via BotFather and configure:
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

