# Global Apache Security Hardening configuration
# This is loaded at the server config level, as ServerTokens is not allowed inside VirtualHost.

# Suppress Apache version, OS, and module list from response headers.
# ServerSignature removes the footer from error pages.
ServerSignature Off

# ServerTokens Prod reduces the "Server:" header to just "Apache".
ServerTokens Prod

# ==============================================================================
# HTTP SECURITY HEADERS
# ==============================================================================
# Requires mod_headers (enabled by default in the serversideup/php fpm-apache image).
#
# NOTE: Content-Security-Policy (CSP) is intentionally OMITTED here.
# ZF1 apps commonly use inline <script> blocks and inline event handlers that
# would require 'unsafe-inline' to be allowed, making CSP largely ineffective.
# If your app is ready for CSP, configure it in Traefik middleware instead
# so it can be tailored per-app without touching this shared config.

<IfModule mod_headers.c>
    # Prevent MIME-type sniffing (browsers must respect Content-Type header)
    Header always set X-Content-Type-Options "nosniff"

    # Prevent clickjacking: deny rendering in iframes from other origins.
    # Change to SAMEORIGIN if your app embeds itself in an iframe on the same domain.
    Header always set X-Frame-Options "DENY"

    # Control referrer information sent with navigation requests.
    # strict-origin-when-cross-origin: sends full URL within same origin, only origin cross-origin.
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Remove the X-Powered-By header that PHP adds by default (exposes PHP version)
    Header always unset X-Powered-By
    Header always unset Server
</IfModule>
