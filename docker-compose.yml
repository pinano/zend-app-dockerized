services:

  # --- App ---
  app:
    image: bogo/${PROJECT_NAME}-app:${PHP_VERSION:-7.4}-fpm-apache
    container_name: ${PROJECT_NAME}-app
    deploy:
      resources:
        limits:
          cpus: '1.0' # Max 1 core per project (increase if heavy)
          memory: 512M # Enough for PHP 7.4 in most apps
        reservations:
          memory: 128M
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
      dockerfile: .docker/Dockerfile
      args:
        - PHP_VERSION=${PHP_VERSION:-7.4}
        - USER_ID=${USER_ID:-1000}
        - GROUP_ID=${GROUP_ID:-1000}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./.docker/apache/httpd.conf:/etc/apache2/vhost-templates/http.conf:ro
      - ./docroot:/var/www/html
      - type: tmpfs
        target: /var/www/html/tmp
        tmpfs:
          size: 128M
    environment:
      # System
      TZ: ${TZ}
      USER_ID: ${USER_ID}
      GROUP_ID: ${GROUP_ID}
      # Apache
      APACHE_DOCUMENT_ROOT: ${APACHE_DOCUMENT_ROOT:-/var/www/html/public}
      APACHE_PROXY_TIMEOUT: ${APACHE_PROXY_TIMEOUT:-1800}
      # PHP
      PHP_ERROR_REPORTING: E_ALL & ~E_NOTICE & E_WARNING & ~E_DEPRECATED
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-50M}
      PHP_UPLOAD_MAX_FILE_SIZE: ${PHP_UPLOAD_MAX_FILE_SIZE:-10M}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-60}
      # Performance Tuning (Realpath)
      #PHP_REALPATH_CACHE_SIZE: 16M
      PHP_REALPATH_CACHE_TTL: 7200
      # Performance Tuning (OPcache)
      PHP_OPCACHE_ENABLE: 1
      PHP_OPCACHE_MEMORY_CONSUMPTION: 256
      PHP_OPCACHE_MAX_ACCELERATED_FILES: 20000
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
      PHP_OPCACHE_REVALIDATE_FREQ: 0
      # Database
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/healthcheck || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - traefik
      - backnet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.${PROJECT_NAME}-app.loadbalancer.server.port=8080"

  # --- MariaDB ---
  db:
    image: mariadb:12.1.2
    container_name: ${PROJECT_NAME}-db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=100 # You don't need 1000 per project
      - --innodb-buffer-pool-size=256M # Adjust according to your DB size
      - --innodb-log-file-size=64M
    deploy:
      resources:
        limits:
          cpus: '2.0' # MariaDB appreciates a bit more headroom during peaks
          memory: 1G # Strict limit to prevent infinite growth
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_HOST_PORT}:3306" # <--- Only accessible from the host itself
    environment:
      TZ: ${TZ}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    restart: unless-stopped
    networks:
      - backnet

  # --- SFTP ---
  sftp:
    image: atmoz/sftp:alpine
    container_name: ${PROJECT_NAME}-sftp
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SFTP_PORT}:22" # <--- Only accessible from the host itself
    volumes:
      - ./docroot:/home/${SFTP_USER}/upload
    command: ${SFTP_USER}:${SFTP_PASS}:${USER_ID:-1000}:${GROUP_ID:-1000}
    networks:
      - backnet

# --- Networks ---
networks:
  traefik:
    external: true
  backnet:
    # Docker will create a distinct 'backnet' for each project
    driver: bridge
